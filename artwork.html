<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kay's Originals | Artwork</title>
  <meta name="description" content="Explore featured artwork in Kay's Originals collection." />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="ribbon-bg"></div>
    <a class="brand" href="index.html" aria-label="Kay's Originals home">
      <img src="assets/logo.png" alt="Kay's Originals logo" />
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      <ul>
        <li><a href="index.html" data-nav="home">Home</a></li>
        <li><a href="artwork.html" data-nav="artwork">Artwork</a></li>
        <li><a href="artists.html" data-nav="artists">Artists</a></li>
        <li><a href="application.html" data-nav="application">Artists Application</a></li>
        <li><a href="contact.html" data-nav="contact">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="page-head">
      <h1>Artwork</h1>
      <p>Find the piece of your dreams with Kay's Originals...</p>
    </section>

    <section class="toolbar">
      <label for="artFilter">Filter By</label>
      <select id="artFilter" aria-label="Filter artwork">
        <option value="all">All Mediums</option>
        <option value="painting">Paintings</option>
        <option value="drawing">Drawings</option>
        <option value="print">Prints</option>
      </select>
    </section>

    <section id="artworkGrid" class="grid cards-grid" aria-live="polite"></section>

    <div class="center-row">
      <button id="artworkToggle" class="link-button" type="button">View More</button>
    </div>
  </main>

  <div id="artworkModal" class="modal" role="dialog" aria-hidden="true">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close details">&times;</button>
      <div class="modal-body">
        <h2 id="modalTitle"></h2>
        <p id="modalArtist" class="modal-artist"></p>
        <div class="modal-details">
          <div class="detail-row">
            <span class="detail-label">Year Created:</span>
            <span id="modalYear" class="detail-value"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Medium:</span>
            <span id="modalMedium" class="detail-value"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Price:</span>
            <span id="modalPrice" class="detail-value"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Status:</span>
            <span id="modalStatus" class="detail-value"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>© <span id="year"></span> All Rights Reserved | Kay's Original | Privacy Statement</p>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
